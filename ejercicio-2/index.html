<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ejercicio 1</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    </head>
    <body>
        <div class="container">
            <section class="mb-5">
                <h2>A) Cada color cuenta una historia</h2>
                <p>El color NO es decoración: comunica la intención de la
                    acción.</p>

                <button type="button" class="btn btn-primary">primary — acción
                    principal</button>
                <button type="button" class="btn btn-secondary">secondary —
                    acción secundaria</button>
                <button type="button" class="btn btn-success">success —
                    confirmar / lanzar 🚀</button>
                <button type="button" class="btn btn-danger">danger —
                    ¡autodestrucción! 💥</button>
                <button type="button" class="btn btn-warning">warning — cuidado
                    ⚠️</button>
                <button type="button" class="btn btn-info">info — más
                    información</button>
                <button type="button" class="btn btn-light">light —
                    discreto</button>
                <button type="button" class="btn btn-dark">dark —
                    elegante</button>
                <button type="button" class="btn btn-link">link — parece
                    enlace</button>
            </section>
            <section class="mb-5">
                <h2>B) Versión "outline": mismo mensaje, menos ruido</h2>
                <p>Útil para acciones disponibles pero no protagonistas.</p>
                <button type="button" class="btn btn-outline-primary">outline-primary</button>
                <button type="button" class="btn btn-outline-success">outline-success</button>
                <button type="button" class="btn btn-outline-danger">outline-danger</button>
            </section>
            <section class="mb-5">
                <h2>C) Tamaños: del botón de emergencia al botón tímido</h2>
                <button type="button" class="btn btn-danger btn-lg">btn-lg — BOTÓN GRANDE 🔴</button>
                <button type="button" class="btn btn-danger">normal</button>
                <button type="button" class="btn btn-danger btn-sm">btn-sm — pequeñito</button>
            </section>
             <section class="mb-5">
                <h2>D) Estados: activo y deshabilitado</h2>
                <!-- disabled: el motor aún no está listo, no se puede lanzar -->
                <button type="button" class="btn btn-success" disabled>Lanzar cohete (motor apagado ⛔)</button>
                <button type="button" class="btn btn-primary active">Botón activo (presionado)</button>
            </section>
        </div>

    </body>
</html>
