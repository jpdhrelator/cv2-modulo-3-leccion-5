<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ejercicio 9</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    </head>
    <body>
        <div class="container">
            <section class="mb-5">
    <h2>A) Tooltip: el susurro 🤫 (hover)</h2>
    <p>Paso 1 — Marcado HTML: <code>data-bs-toggle="tooltip"</code> + el texto en <code>title</code>.</p>
    <p>Pasa el mouse sobre los botones (sin hacer clic):</p>

    <button type="button" class="btn btn-primary" data-bs-toggle="tooltip"
            title="¡Hola! Soy un tooltip básico (aparece arriba por defecto)">
      Pasa el mouse 👆
    </button>

    <!-- data-bs-placement controla dónde aparece -->
    <button type="button" class="btn btn-secondary" data-bs-toggle="tooltip"
            data-bs-placement="right" title="Aparezco a la derecha ➡️">
      Tooltip derecha
    </button>

    <button type="button" class="btn btn-secondary" data-bs-toggle="tooltip"
            data-bs-placement="bottom" title="Aparezco abajo ⬇️">
      Tooltip abajo
    </button>

    <!-- Caso de uso real: iconos cuyo significado no es obvio -->
    <p class="mt-4">Caso de uso real — barra de herramientas con iconos misteriosos:</p>
    <div class="btn-group">
      <button class="btn btn-outline-dark" data-bs-toggle="tooltip" title="Guardar">💾</button>
      <button class="btn btn-outline-dark" data-bs-toggle="tooltip" title="Deshacer">↩️</button>
      <button class="btn btn-outline-dark" data-bs-toggle="tooltip" title="Imprimir">🖨️</button>
      <button class="btn btn-outline-dark" data-bs-toggle="tooltip" title="Eliminar para siempre (¡sin tooltip nadie lo sabría!)">🗑️</button>
    </div>
  </section>
        </div>

    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('[data-bs-toggle="tooltip"]')
    .forEach(el => new bootstrap.Tooltip(el));
    </script>
</html>
