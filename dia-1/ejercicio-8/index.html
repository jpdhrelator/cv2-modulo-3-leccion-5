<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ejercicio 8</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    </head>
    <body>
        <div class="container">
            <div id="miCarrusel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="0" class="active" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>
            <div class="carousel-inner rounded">
                <div class="carousel-item active">
                    <!-- "Foto" 1: playa, hecha en SVG -->
                    <svg class="d-block w-100" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
                        <rect width="800" height="260" fill="#87ceeb"/>
                        <rect y="260" width="800" height="140" fill="#f4d49a"/>
                        <circle cx="650" cy="80" r="45" fill="#ffd93b"/>
                        <text x="400" y="220" font-size="80" text-anchor="middle">🏖️ 🌴</text>
                    </svg>
                    <div class="carousel-caption d-none d-md-block">
                    <h5>Día 1: La playa</h5>
                    <p>Expectativa: descansar. Realidad: pensar en el bug del viernes.</p>
                    </div>
                </div>
                <div class="carousel-item">
                        <!-- "Foto" 2: montaña -->
                        <svg class="d-block w-100" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
                        <rect width="800" height="400" fill="#b3e0ff"/>
                        <polygon points="100,400 350,100 600,400" fill="#6c757d"/>
                        <polygon points="350,100 300,160 400,160" fill="white"/>
                        <text x="400" y="350" font-size="70" text-anchor="middle">⛰️ 🥾</text>
                        </svg>
                        <div class="carousel-caption d-none d-md-block">
                        <h5>Día 2: La montaña</h5>
                        <p>Sin señal. Por fin nadie escribe "¿estás?" en Slack.</p>
                        </div>
                    </div>

                <div class="carousel-item">
                    <!-- "Foto" 3: de vuelta al PC -->
                    <svg class="d-block w-100" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
                    <rect width="800" height="400" fill="#212529"/>
                    <rect x="250" y="100" width="300" height="180" rx="10" fill="#0d6efd"/>
                    <text x="400" y="210" font-size="60" text-anchor="middle">💻</text>
                    <text x="400" y="350" font-size="30" text-anchor="middle" fill="white">Día 3: extrañaba mi teclado</text>
                    </svg>
                    <div class="carousel-caption d-none d-md-block">
                    <h5>Día 3: Hogar dulce hogar</h5>
                    <p>Las mejores vacaciones terminan en localhost:3000.</p>
                    </div>
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#miCarrusel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Anterior</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#miCarrusel" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Siguiente</span>
                </button>

            </div>    

            </div>
        </div>

    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
